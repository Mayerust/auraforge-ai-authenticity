version: "3.9"

services:
  auraforge:
    build: .
    container_name: auraforge_api
    ports:
      - "8000:8000"
    volumes:
      - ./model.pkl:/app/model.pkl:ro
      - ./logs:/app/logs
      - ./static:/app/static:ro
    environment:
      - REQUIRE_API_KEY=false
      - AURAFORGE_API_KEYS=demo-key-123,test-key-456
      - MODEL_PATH=/app/model.pkl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
